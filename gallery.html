<!DOCTYPE html>
<html lang="pl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria zdjęć teleskopu</title>
    <style>
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
            padding: 12px;
            text-align: center;
        }

        h2 {
            margin: 10px 0 15px 0;
        }

        .topbar {
            max-width: 900px;
            margin: 0 auto 18px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button, a.button {
            display: block;
            text-decoration: none;
            padding: 14px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            background: #225588;
            color: white;
            cursor: pointer;
        }

        .empty {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
            background: #262626;
            border-radius: 12px;
            color: #bdbdbd;
        }

        .gallery {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .card {
            background: #262626;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #333;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            background: #111;
        }

        .name {
            font-size: 0.85em;
            color: #cfcfcf;
            margin-top: 8px;
            word-break: break-all;
        }

        .open {
            margin-top: 8px;
            display: block;
            color: #00ff88;
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h2>Galeria zdjęć teleskopu</h2>
    <div class="empty" style="margin-top:0;padding:10px;">Folder zdjęć: {{ folder_zapisu }}</div>

    <div class="topbar">
        <a class="button" href="/">← Wróć do pilota</a>
        <a class="button" href="/gallery">Odśwież galerię</a>
    </div>

    {% if photos %}
        <div class="gallery">
            {% for photo in photos %}
                <div class="card">
                    <a href="{{ photo.url }}" target="_blank">
                        <img src="{{ photo.url }}" alt="{{ photo.name }}">
                    </a>
                    <div class="name">{{ photo.name }}</div>
                    <a class="open" href="{{ photo.url }}" target="_blank">Otwórz pełny rozmiar</a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty">
            Brak zdjęć. Wróć do pilota i kliknij „Zrób zdjęcie”.
        </div>
    {% endif %}
</body>
</html>
